<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Chatbot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="avatar">+</div>
      <div>
        <h1>Medical Chatbot</h1>
        <p class="subtitle">Ask a medical question</p>
      </div>
    </header>

    <main id="messages" class="messages">
      <div class="msg bot">
        <div class="bubble">Hi! Ask me about symptoms, conditions, or treatments described in the source PDF.</div>
      </div>
    </main>

    <form id="chat-form" class="chat-form" autocomplete="off">
      <input id="msg" name="msg" type="text" placeholder="Type your question..." required />
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('msg');
    const messages = document.getElementById('messages');

    function appendMessage(role, text) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + role;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrap.appendChild(bubble);
      messages.appendChild(wrap);
      messages.scrollTop = messages.scrollHeight;
      return bubble;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      appendMessage('user', text);
      input.value = '';
      const thinking = appendMessage('bot', 'Thinking…');
      try {
        const fd = new FormData();
        fd.append('msg', text);
        const res = await fetch('/get', { method: 'POST', body: fd });
        const answer = await res.text();
        thinking.textContent = answer;
      } catch (err) {
        thinking.textContent = 'Error: ' + err.message;
      }
    });
  </script>
</body>
</html>
